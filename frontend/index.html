<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clinic Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #ececec;
      display: flex;
      height: 100dvh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 270px;
      min-width: 270px;
      background: #161b27;
      border-right: 1px solid #2a2f3e;
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
      overflow-y: auto;
    }

    .sidebar-logo { text-align: center; margin-bottom: 20px; }
    .sidebar-logo .icon  { font-size: 36px; margin-bottom: 8px; }
    .sidebar-logo .title { font-size: 16px; font-weight: 600; color: #fff; letter-spacing: -0.2px; }
    .sidebar-logo .sub   { font-size: 12px; color: #6b7280; margin-top: 3px; }

    .sidebar-divider { border: none; border-top: 1px solid #2a2f3e; margin: 14px 0; }

    .section-label {
      font-size: 10px; font-weight: 500; color: #4b5563;
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed #2a2f3e;
      border-radius: 10px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: #1a1f2e;
      margin-bottom: 10px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #2563eb;
      background: #1c2440;
    }
    .upload-zone .uz-icon  { font-size: 24px; margin-bottom: 6px; }
    .upload-zone .uz-title { font-size: 13px; font-weight: 500; color: #e5e7eb; }
    .upload-zone .uz-sub   { font-size: 11px; color: #6b7280; margin-top: 3px; }

    #file-input { display: none; }

    /* ── Pending file list ── */
    .file-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      background: #1e2330; border: 1px solid #2a2f3e;
      border-radius: 8px; padding: 7px 10px; font-size: 12px; color: #9ca3af;
    }
    .file-item .fi-icon { font-size: 14px; flex-shrink: 0; }
    .file-item .fi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item .fi-remove {
      cursor: pointer; color: #4b5563; font-size: 14px;
      transition: color 0.2s; flex-shrink: 0;
    }
    .file-item .fi-remove:hover { color: #ef4444; }

    /* ── Ingest button ── */
    .btn-ingest {
      width: 100%; padding: 9px; background: #2563eb;
      border: none; border-radius: 8px; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s ease; margin-bottom: 8px;
    }
    .btn-ingest:hover    { background: #1d4ed8; }
    .btn-ingest:disabled { background: #1e2330; color: #4b5563; cursor: not-allowed; }

    /* ── Status message ── */
    .upload-status {
      font-size: 12px; border-radius: 8px; padding: 8px 10px;
      margin-bottom: 8px; display: none; line-height: 1.4;
    }
    .upload-status.success { background: #14261e; color: #4ade80; border: 1px solid #166534; display: block; }
    .upload-status.error   { background: #2a1515; color: #f87171; border: 1px solid #7f1d1d; display: block; }
    .upload-status.loading { background: #1a1f2e; color: #93c5fd; border: 1px solid #1e3a5f; display: block; }

    /* ── Ingested doc list ── */
    .doc-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
    .doc-item  { font-size: 12px; color: #6b7280; padding: 3px 4px; border-radius: 6px; }

    .sidebar-spacer { flex: 1; min-height: 20px; }

    /* ── New chat button ── */
    .btn-new-chat {
      width: 100%; padding: 9px 16px; background: #1e2330;
      border: 1px solid #2a2f3e; border-radius: 8px; color: #9ca3af;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s ease; margin-bottom: 14px;
    }
    .btn-new-chat:hover { background: #252b3b; border-color: #ef4444; color: #ef4444; }

    .sidebar-footer { font-size: 11px; color: #374151; text-align: center; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chat-window {
      flex: 1; overflow-y: auto; padding: 32px 16px 16px;
      display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
    }
    .chat-inner {
      max-width: 740px; width: 100%; margin: 0 auto;
      display: flex; flex-direction: column; gap: 4px;
    }

    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: #2a2f3e; border-radius: 4px; }

    /* ── Empty state ── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 20px; gap: 8px;
    }
    .empty-state .es-icon { font-size: 48px; margin-bottom: 4px; }
    .empty-state h2 { font-size: 20px; font-weight: 600; color: #e5e7eb; }
    .empty-state p  { font-size: 13px; color: #6b7280; }

    /* ── Suggestions ── */
    .suggestions {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px; margin-top: 24px; width: 100%; max-width: 680px;
    }
    .suggestion-card {
      background: #1a1f2e; border: 1px solid #2a2f3e; border-radius: 12px;
      padding: 12px 14px; font-size: 13px; color: #9ca3af; cursor: pointer;
      text-align: left; font-family: 'Inter', sans-serif;
      transition: all 0.2s ease; line-height: 1.4;
    }
    .suggestion-card:hover { background: #252b3b; border-color: #2563eb; color: #e5e7eb; }

    /* ── Not-ready state ── */
    .not-ready-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px 20px; gap: 10px;
    }
    .not-ready-state .nr-icon { font-size: 48px; }
    .not-ready-state h2 { font-size: 18px; font-weight: 600; color: #e5e7eb; }
    .not-ready-state p  { font-size: 13px; color: #6b7280; max-width: 320px; line-height: 1.6; }
    .nr-arrow { font-size: 28px; color: #2563eb; margin-top: 8px; animation: point 1.2s ease-in-out infinite; }
    @keyframes point { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-6px)} }

    /* ── Messages ── */
    .msg-row { display: flex; align-items: flex-end; gap: 8px; margin: 6px 0; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot  { justify-content: flex-start; }

    .avatar { font-size: 20px; flex-shrink: 0; margin-bottom: 2px; }

    .bubble {
      padding: 10px 16px; font-size: 14px; line-height: 1.65;
      max-width: 72%; word-wrap: break-word; white-space: pre-wrap;
    }
    .msg-row.user .bubble {
      background: #2563eb; color: #fff;
      border-radius: 18px 18px 4px 18px;
      box-shadow: 0 2px 8px rgba(37,99,235,0.25);
    }
    .msg-row.bot .bubble {
      background: #1e2330; color: #e2e8f0;
      border-radius: 18px 18px 18px 4px;
      border: 1px solid #2a2f3e;
    }

    /* ── Typing indicator ── */
    .typing-indicator { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
    .typing-dots {
      display: flex; gap: 4px; background: #1e2330;
      border: 1px solid #2a2f3e; border-radius: 18px 18px 18px 4px;
      padding: 12px 16px;
    }
    .typing-dots span {
      width: 6px; height: 6px; background: #6b7280;
      border-radius: 50%; animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform:translateY(0); opacity:0.4; }
      30%          { transform:translateY(-5px); opacity:1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 12px 16px 20px; background: #0f1117;
      border-top: 1px solid #1e2330;
    }
    .input-inner { max-width: 740px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }

    #user-input {
      flex: 1; background: #1a1f2e; border: 1px solid #2a2f3e;
      border-radius: 12px; color: #ececec;
      font-family: 'Inter', system-ui, sans-serif; font-size: 14px;
      padding: 12px 16px; resize: none; line-height: 1.5;
      max-height: 120px; overflow-y: auto; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #user-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    #user-input::placeholder { color: #4b5563; }
    #user-input:disabled { opacity: 0.5; cursor: not-allowed; }

    #send-btn {
      background: #2563eb; border: none; border-radius: 10px; color: #fff;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      padding: 11px 20px; cursor: pointer; flex-shrink: 0; align-self: flex-end;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover    { background: #1d4ed8; transform: translateY(-1px); }
    #send-btn:active   { transform: translateY(0); }
    #send-btn:disabled { background: #1e2330; color: #4b5563; cursor: not-allowed; transform: none; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .bubble  { max-width: 88%; }
      .suggestions { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="icon">🏥</div>
      <div class="title">Clinic Assistant</div>
      <div class="sub">Your clinic knowledge base</div>
    </div>

    <hr class="sidebar-divider" />

    <div class="section-label">Upload Documents <span style="color:#374151;font-size:10px;">(optional)</span></div>

    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="uz-icon">📂</div>
      <div class="uz-title">Drop files here or click to browse</div>
      <div class="uz-sub">.txt &nbsp;·&nbsp; .pdf &nbsp;·&nbsp; .docx &nbsp;·&nbsp; .md</div>
    </div>

    <input type="file" id="file-input" multiple accept=".txt,.pdf,.docx,.md" />

    <div class="file-list" id="file-list"></div>

    <button class="btn-ingest" id="ingest-btn" disabled onclick="ingestFiles()">
      ⚡ Ingest Documents
    </button>

    <div class="upload-status" id="upload-status"></div>

    <hr class="sidebar-divider" />

    <div class="section-label" id="docs-label" style="display:none;">Ingested documents</div>
    <div class="doc-list" id="doc-list"></div>

    <div class="sidebar-spacer"></div>

    <button class="btn-new-chat" onclick="clearChat()">🗑️ New Chat</button>
    <div class="sidebar-footer">Powered by LlamaIndex + GPT-4o mini</div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="chat-window" id="chat-window">
      <div class="chat-inner" id="chat-inner">
        <div id="main-state"></div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-inner">
        <textarea id="user-input" rows="1"
          placeholder="Upload documents first, or ask a question..."
          disabled></textarea>
        <button id="send-btn" onclick="sendMessage()" disabled>Send ↑</button>
      </div>
    </div>
  </main>

  <script>
    // ── State ─────────────────────────────────────────────────
    let history      = [];
    let isWaiting    = false;
    let isReady      = false;
    let pendingFiles = [];
    let ingestedDocs = [];   // accumulates ALL uploaded docs across sessions

    const chatInner  = document.getElementById('chat-inner');
    const mainState  = document.getElementById('main-state');
    const inputEl    = document.getElementById('user-input');
    const sendBtn    = document.getElementById('send-btn');
    const chatWindow = document.getElementById('chat-window');
    const ingestBtn  = document.getElementById('ingest-btn');
    const fileInput  = document.getElementById('file-input');
    const fileListEl = document.getElementById('file-list');
    const statusEl   = document.getElementById('upload-status');
    const uploadZone = document.getElementById('upload-zone');
    const docListEl  = document.getElementById('doc-list');
    const docsLabel  = document.getElementById('docs-label');

    // ── Check backend status on load ──────────────────────────
    async function checkStatus() {
      try {
        const res  = await fetch('/status');
        const data = await res.json();
        if (data.ready) {
          setReady([]);
        } else {
          renderNotReady();
        }
      } catch { renderNotReady(); }
    }

    function renderNotReady() {
      mainState.innerHTML = `
        <div class="not-ready-state">
          <div class="nr-icon">📂</div>
          <h2>No documents loaded yet</h2>
          <p>Upload your documents using the sidebar on the left, then click <strong>Ingest Documents</strong> to get started.</p>
          <div class="nr-arrow">←</div>
        </div>`;
    }

    function renderEmptyChat() {
      mainState.innerHTML = `
        <div class="empty-state" id="empty-state">
          <div class="es-icon">🏥</div>
          <h2>How can I help you today?</h2>
          <p>Ask me anything about your uploaded documents.</p>
          <div class="suggestions">
            <button class="suggestion-card" onclick="sendSuggestion(this)">What are my rights as a patient?</button>
            <button class="suggestion-card" onclick="sendSuggestion(this)">How do I prepare for a colonoscopy?</button>
            <button class="suggestion-card" onclick="sendSuggestion(this)">How do I request a prescription refill?</button>
            <button class="suggestion-card" onclick="sendSuggestion(this)">What should I do in a medical emergency?</button>
            <button class="suggestion-card" onclick="sendSuggestion(this)">Does the clinic accept my insurance?</button>
          </div>
        </div>`;
    }

    function setReady(docNames) {
      isReady = true;
      inputEl.disabled    = false;
      sendBtn.disabled    = false;
      inputEl.placeholder = "Ask about your documents...";

      // Accumulate new doc names — no duplicates
      if (docNames.length > 0) {
        docNames.forEach(name => {
          if (!ingestedDocs.includes(name)) ingestedDocs.push(name);
        });
      }

      // Always refresh sidebar doc list
      if (ingestedDocs.length > 0) {
        docsLabel.style.display = 'block';
        docListEl.innerHTML = ingestedDocs
          .map(n => `<div class="doc-item">📄 ${n}</div>`)
          .join('');
      }

      renderEmptyChat();
      inputEl.focus();
    }

    // ── File picker ───────────────────────────────────────────
    fileInput.addEventListener('change', () => {
      addFiles([...fileInput.files]);
      fileInput.value = '';
    });

    // ── Drag & drop ───────────────────────────────────────────
    uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      addFiles([...e.dataTransfer.files]);
    });

    function addFiles(files) {
      const allowed = ['.txt', '.pdf', '.docx', '.md'];
      files.forEach(f => {
        const ext = '.' + f.name.split('.').pop().toLowerCase();
        if (!allowed.includes(ext)) return;
        if (pendingFiles.find(p => p.name === f.name)) return;
        pendingFiles.push(f);
      });
      renderFileList();
    }

    function renderFileList() {
      fileListEl.innerHTML = pendingFiles.map((f, i) => `
        <div class="file-item">
          <span class="fi-icon">${fileIcon(f.name)}</span>
          <span class="fi-name">${f.name}</span>
          <span class="fi-remove" onclick="removeFile(${i})">✕</span>
        </div>`).join('');
      ingestBtn.disabled = pendingFiles.length === 0;
    }

    function fileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      return { pdf: '📕', docx: '📘', doc: '📘', md: '📝' }[ext] || '📄';
    }

    function removeFile(i) {
      pendingFiles.splice(i, 1);
      renderFileList();
    }

    // ── Ingest ────────────────────────────────────────────────
    async function ingestFiles() {
      if (!pendingFiles.length) return;

      ingestBtn.disabled = true;
      setStatus('loading', '⏳ Ingesting documents, please wait...');

      const formData = new FormData();
      pendingFiles.forEach(f => formData.append('files', f));

      try {
        const res  = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (data.success) {
          setStatus('success', data.message);

          // Clear pending list
          pendingFiles = [];
          renderFileList();

          // Add newly ingested files to the accumulated list
          data.ingested.forEach(name => {
            if (!ingestedDocs.includes(name)) ingestedDocs.push(name);
          });

          // Refresh sidebar doc list
          docsLabel.style.display = 'block';
          docListEl.innerHTML = ingestedDocs
            .map(n => `<div class="doc-item">📄 ${n}</div>`)
            .join('');

          // Unlock chat on first ingestion only
          if (!isReady) setReady([]);

        } else {
          setStatus('error', data.error || 'Ingestion failed.');
          ingestBtn.disabled = false;
        }
      } catch (err) {
        setStatus('error', '⚠️ Could not reach the server.');
        ingestBtn.disabled = false;
      }
    }

    function setStatus(type, msg) {
      statusEl.className   = `upload-status ${type}`;
      statusEl.textContent = msg;
    }

    // ── Chat ──────────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function sendSuggestion(btn) {
      inputEl.value = btn.textContent.trim();
      sendMessage();
    }

    function appendMessage(role, content) {
      const emptyState = document.getElementById('empty-state');
      if (emptyState) emptyState.style.display = 'none';

      const row = document.createElement('div');
      row.className = `msg-row ${role}`;

      if (role === 'bot') {
        const av = document.createElement('div');
        av.className = 'avatar';
        av.textContent = '🏥';
        row.appendChild(av);
      }

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      row.appendChild(bubble);

      chatInner.appendChild(row);
      scrollBottom();
    }

    function showTyping() {
      const row = document.createElement('div');
      row.className = 'typing-indicator';
      row.id = 'typing-indicator';
      row.innerHTML = `<div class="avatar">🏥</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>`;
      chatInner.appendChild(row);
      scrollBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function scrollBottom() { chatWindow.scrollTop = chatWindow.scrollHeight; }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || isWaiting || !isReady) return;

      isWaiting = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';

      const isFirst = history.length === 0;
      appendMessage('user', message);
      showTyping();

      try {
        const res  = await fetch('/chat', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ message, history, new_session: isFirst }),
        });
        const data   = await res.json();
        const answer = data.answer || '⚠️ No response received.';
        hideTyping();
        appendMessage('bot', answer);
        history.push({ role: 'user',      content: message });
        history.push({ role: 'assistant', content: answer  });
      } catch {
        hideTyping();
        appendMessage('bot', '⚠️ Could not reach the server. Is api.py running?');
      }

      isWaiting = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    function clearChat() {
      history = [];
      chatInner.querySelectorAll('.msg-row, .typing-indicator').forEach(r => r.remove());
      if (isReady) renderEmptyChat();
    }

    // ── Init ──────────────────────────────────────────────────
    checkStatus();
  </script>
</body>
</html>
